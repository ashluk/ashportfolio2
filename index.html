<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash Luk Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- BACKGROUND EYEBALL -->
  <div class="eyeball-bg">
    <img src="images/eyeball.png" alt="Eyeball background" />
  </div>
 
  <main class="page">
    <header class="hero">
      <img src="images/title.png" alt="Ash Luk Studio" class="title-image" />
    </header>
 
    <section class="collage">
      <figure class="piece piece-1"><img src="images/pressindex-blue-white-logo.jpg" /></figure>
      <figure class="piece piece-2"><img src="images/pressIndex-grey-orange-logo.jpg" /></figure>
      <figure class="piece piece-3"><img src="images/pressindexready.jpg" /></figure>
      <figure class="piece piece-4"><img src="images/raphaarchive.jpg" /></figure>
      <figure class="piece piece-5"><img src="images/raphacold.jpg" /></figure>
      <figure class="piece piece-6"><img src="images/raphafind.jpg" /></figure>
      <figure class="piece piece-7"><img src="images/raphamenu1.jpg" /></figure>
      <figure class="piece piece-8"><img src="images/raphamenu2.jpg" /></figure>
      <figure class="piece piece-9"><img src="images/raphamenu3.jpg" /></figure>
      <figure class="piece piece-10"><img src="images/reverse1.jpg" /></figure>
      <figure class="piece piece-11"><img src="images/umfjcard1.jpg" /></figure>
      <figure class="piece piece-12"><img src="images/umfjcard2.jpg" /></figure>
      <figure class="piece piece-13"><img src="images/wows1.jpg" /></figure>
      <figure class="piece piece-14"><img src="images/wowszero.jpg" /></figure>
    </section>
  </main>
 
  <script src="script.js"></script>
</body>
</html>
